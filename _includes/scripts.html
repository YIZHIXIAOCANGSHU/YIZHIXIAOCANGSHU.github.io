<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>
<script>
(function () {
  if (window.__themeSelectorBundleReady || window.__themeSelectorFallbackReady) {
    return;
  }

  window.__themeSelectorFallbackReady = true;

  const mediaQuery =
    window.matchMedia && typeof window.matchMedia === "function"
      ? window.matchMedia("(prefers-color-scheme: dark)")
      : null;

  function getStoredTheme() {
    try {
      const theme = localStorage.getItem("theme");
      return theme === "light" || theme === "dark" || theme === "geek" ? theme : null;
    } catch (error) {
      return null;
    }
  }

  function getComputedTheme() {
    return getStoredTheme() || (mediaQuery && mediaQuery.matches ? "dark" : "light");
  }

  function updateThemeIcon(theme) {
    const icon = document.getElementById("theme-icon");
    if (!icon) {
      return;
    }

    icon.className = "fa-solid";

    if (theme === "dark") {
      icon.classList.add("fa-moon");
      return;
    }

    if (theme === "geek") {
      icon.classList.add("fa-terminal");
      return;
    }

    icon.classList.add("fa-sun");
  }

  function setTheme(theme) {
    const resolvedTheme = theme || getComputedTheme();
    document.documentElement.removeAttribute("data-theme");

    if (resolvedTheme === "dark" || resolvedTheme === "geek") {
      document.documentElement.setAttribute("data-theme", resolvedTheme);
    }

    updateThemeIcon(resolvedTheme);

    document.querySelectorAll(".theme-dropdown li").forEach(function (item) {
      item.classList.toggle("active", item.getAttribute("data-theme") === resolvedTheme);
    });
  }

  function initThemeSelector() {
    if (window.__themeSelectorBundleReady) {
      return;
    }

    const button = document.querySelector(".theme-toggle-btn");
    const dropdown = document.querySelector(".theme-dropdown");

    if (!button || !dropdown || button.dataset.themeFallbackBound === "true") {
      setTheme();
      return;
    }

    button.dataset.themeFallbackBound = "true";

    const closeDropdown = function () {
      dropdown.classList.remove("show");
      button.setAttribute("aria-expanded", "false");
    };

    button.addEventListener("click", function (event) {
      event.preventDefault();
      event.stopPropagation();

      const shouldOpen = !dropdown.classList.contains("show");
      dropdown.classList.toggle("show", shouldOpen);
      button.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
    });

    dropdown.querySelectorAll("li").forEach(function (item) {
      item.addEventListener("click", function (event) {
        event.preventDefault();
        event.stopPropagation();

        const newTheme = item.getAttribute("data-theme");
        if (!newTheme) {
          return;
        }

        try {
          localStorage.setItem("theme", newTheme);
        } catch (error) {}

        setTheme(newTheme);
        closeDropdown();
      });
    });

    document.addEventListener("click", function (event) {
      if (!dropdown.contains(event.target) && !button.contains(event.target)) {
        closeDropdown();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeDropdown();
      }
    });

    setTheme();
  }

  function bindSystemThemeChanges() {
    if (!mediaQuery) {
      return;
    }

    const handleThemeChange = function (event) {
      if (window.__themeSelectorBundleReady) {
        return;
      }

      if (!getStoredTheme()) {
        setTheme(event.matches ? "dark" : "light");
      }
    };

    if (typeof mediaQuery.addEventListener === "function") {
      mediaQuery.addEventListener("change", handleThemeChange);
      return;
    }

    if (typeof mediaQuery.addListener === "function") {
      mediaQuery.addListener(handleThemeChange);
    }
  }

  const scheduleThemeInit = function () {
    window.setTimeout(initThemeSelector, 0);
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", scheduleThemeInit, { once: true });
  } else {
    scheduleThemeInit();
  }

  bindSystemThemeChanges();
})();
</script>
