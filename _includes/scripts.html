<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

<!-- 主题切换功能 -->
<script>
(function() {
  // 检测系统/浏览器偏好
  const browserPref = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  
  // 设置主题
  function setTheme(theme) {
    const useTheme = theme || localStorage.getItem("theme") || browserPref;
    
    // 移除所有主题属性
    document.documentElement.removeAttribute("data-theme");
    
    if (useTheme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
      updateIcon("fa-moon");
    } else if (useTheme === "geek") {
      document.documentElement.setAttribute("data-theme", "geek");
      updateIcon("fa-terminal");
    } else {
      updateIcon("fa-sun");
    }
    
    // 更新下拉菜单中的选中状态
    document.querySelectorAll(".theme-dropdown li").forEach(function(li) {
      li.classList.remove("active");
      if (li.getAttribute("data-theme") === useTheme) {
        li.classList.add("active");
      }
    });
  }
  
  // 更新图标
  function updateIcon(iconClass) {
    const icon = document.getElementById("theme-icon");
    if (icon) {
      icon.className = "fa-solid " + iconClass;
    }
  }
  
  // 页面加载完成后初始化
  document.addEventListener("DOMContentLoaded", function() {
    // 初始化主题
    setTheme();
    
    // 主题切换按钮点击事件
    const toggleBtn = document.querySelector(".theme-toggle-btn");
    const dropdown = document.querySelector(".theme-dropdown");
    
    if (toggleBtn && dropdown) {
      toggleBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        dropdown.classList.toggle("show");
      });
      
      // 选择主题
      dropdown.querySelectorAll("li").forEach(function(li) {
        li.addEventListener("click", function(e) {
          e.stopPropagation();
          const newTheme = this.getAttribute("data-theme");
          localStorage.setItem("theme", newTheme);
          setTheme(newTheme);
          dropdown.classList.remove("show");
        });
      });
      
      // 点击其他地方关闭下拉菜单
      document.addEventListener("click", function() {
        dropdown.classList.remove("show");
      });
    }
    
    // 监听系统主题变化
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener("change", function(e) {
      if (!localStorage.getItem("theme")) {
        setTheme(e.matches ? "dark" : "light");
      }
    });
  });
})();
</script>
