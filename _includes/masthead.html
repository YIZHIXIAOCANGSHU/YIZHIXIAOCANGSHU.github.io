{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
      <!-- 主题选择下拉菜单 - 放在 greedy-nav 外面 -->
      <div class="theme-selector">
        <button class="theme-toggle-btn" aria-label="切换主题">
          <i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true"></i>
        </button>
        <ul class="theme-dropdown">
          <li data-theme="light"><i class="fa-solid fa-sun"></i> 白天</li>
          <li data-theme="dark"><i class="fa-solid fa-moon"></i> 夜晚</li>
          <li data-theme="geek"><i class="fa-solid fa-terminal"></i> 极客</li>
        </ul>
      </div>
    </div>
  </div>
</div>
