{% comment %}
  Timeline Scripts Component

  Loads GSAP and ScrollTrigger and initializes timeline animations
  and category filtering for each timeline instance on the page.
{% endcomment %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
        integrity="sha512-7eHRwcbYkK4d9g/6tD/mhkf++eoTHwpNM9woBxtPUBWm67zeAfFC+HrdoE2GanKeocly/VxeLvIqwvCdk7qScg=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"
        integrity="sha512-onMTRKJBKz8M1TnqqDuGBlowlH0ohFzMXYRNebz+yOcc5TQr/zAKsthzhuv0hiyUKEiQEQXEynnXCvNTOk50dg=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>

<script>
(function () {
  if (window.timelineComponentBooted) {
    return;
  }
  window.timelineComponentBooted = true;

  const timelineAnimationConfig = {
    itemEntrance: {
      y: 48,
      opacity: 0,
      duration: 0.8,
      ease: "power2.out",
      stagger: 0.14
    },
    lineAnimation: {
      scaleX: 0,
      transformOrigin: "left center",
      duration: 1.1,
      ease: "power2.inOut"
    },
    scrollTrigger: {
      start: "top 82%",
      toggleActions: "play none none reverse"
    }
  };

  function prefersReducedMotion() {
    return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  }

  function getVisibleItems(shell) {
    return Array.from(shell.querySelectorAll(".horizontal-timeline-item")).filter(function (item) {
      return !item.classList.contains("hidden");
    });
  }

  function setActiveItem(shell, target) {
    shell.querySelectorAll(".horizontal-timeline-item").forEach(function (item) {
      item.classList.toggle("is-active", item === target);
    });
  }

  function refreshActiveItem(shell) {
    const visibleItems = getVisibleItems(shell);
    if (!visibleItems.length) {
      return;
    }

    const currentActive = visibleItems.find(function (item) {
      return item.classList.contains("is-active");
    });

    setActiveItem(shell, currentActive || visibleItems[0]);
  }

  function bindItemHighlights(shell) {
    shell.querySelectorAll(".horizontal-timeline-item").forEach(function (item) {
      item.addEventListener("mouseenter", function () {
        setActiveItem(shell, item);
      });

      item.addEventListener("focusin", function () {
        setActiveItem(shell, item);
      });
    });

    refreshActiveItem(shell);
  }

  function applyFallback(shell) {
    const timeline = shell.querySelector(".horizontal-timeline");
    if (!timeline) {
      return;
    }

    timeline.classList.add("no-gsap");
    shell.querySelectorAll(".horizontal-timeline-item.gsap-init").forEach(function (item) {
      item.classList.remove("gsap-init");
    });
  }

  function showWithoutAnimation(shell) {
    shell.querySelectorAll(".horizontal-timeline-item").forEach(function (item) {
      item.classList.remove("gsap-init");
      item.classList.add("gsap-animated");
      item.style.opacity = "1";
      item.style.transform = "none";
    });

    const line = shell.querySelector(".horizontal-timeline-line");
    if (line) {
      line.style.transform = "scaleX(1)";
    }
  }

  function initTimelineAnimations(shell) {
    if (shell.dataset.timelineAnimated === "true") {
      return;
    }

    const timeline = shell.querySelector(".horizontal-timeline");
    const timelineLine = shell.querySelector(".horizontal-timeline-line");
    const timelineItems = shell.querySelectorAll(".horizontal-timeline-item");

    if (!timeline || !timelineItems.length) {
      return;
    }

    if (prefersReducedMotion()) {
      showWithoutAnimation(shell);
      shell.dataset.timelineAnimated = "true";
      return;
    }

    if (typeof window.gsap === "undefined" || typeof window.ScrollTrigger === "undefined") {
      applyFallback(shell);
      shell.dataset.timelineAnimated = "true";
      return;
    }

    gsap.registerPlugin(ScrollTrigger);

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: timeline,
        start: timelineAnimationConfig.scrollTrigger.start,
        toggleActions: timelineAnimationConfig.scrollTrigger.toggleActions
      }
    });

    if (timelineLine) {
      gsap.set(timelineLine, {
        scaleX: timelineAnimationConfig.lineAnimation.scaleX,
        transformOrigin: timelineAnimationConfig.lineAnimation.transformOrigin
      });

      tl.to(timelineLine, {
        scaleX: 1,
        duration: timelineAnimationConfig.lineAnimation.duration,
        ease: timelineAnimationConfig.lineAnimation.ease
      });
    }

    gsap.set(timelineItems, {
      y: timelineAnimationConfig.itemEntrance.y,
      opacity: timelineAnimationConfig.itemEntrance.opacity
    });

    tl.to(timelineItems, {
      y: 0,
      opacity: 1,
      duration: timelineAnimationConfig.itemEntrance.duration,
      ease: timelineAnimationConfig.itemEntrance.ease,
      stagger: timelineAnimationConfig.itemEntrance.stagger,
      onComplete: function () {
        timelineItems.forEach(function (item) {
          item.classList.remove("gsap-init");
          item.classList.add("gsap-animated");
        });
      }
    }, "-=0.65");

    shell.dataset.timelineAnimated = "true";
  }

  function initTimelineTabs(shell) {
    const tabs = shell.querySelectorAll(".timeline-tab");
    const items = shell.querySelectorAll(".horizontal-timeline-item");
    const timeline = shell.querySelector(".horizontal-timeline");

    if (!tabs.length || !items.length) {
      return;
    }

    tabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        const filter = tab.dataset.filter;

        tabs.forEach(function (currentTab) {
          const isActive = currentTab === tab;
          currentTab.classList.toggle("active", isActive);
          currentTab.setAttribute("aria-pressed", isActive ? "true" : "false");
        });

        items.forEach(function (item) {
          const shouldShow = filter === "all" || item.dataset.category === filter;
          item.classList.toggle("hidden", !shouldShow);
        });

        if (timeline) {
          if (typeof timeline.scrollTo === "function") {
            timeline.scrollTo({
              left: 0,
              behavior: prefersReducedMotion() ? "auto" : "smooth"
            });
          } else {
            timeline.scrollLeft = 0;
          }
        }

        refreshActiveItem(shell);

        if (typeof window.ScrollTrigger !== "undefined") {
          ScrollTrigger.refresh();
        }
      });
    });
  }

  function initTimelineShell(shell) {
    if (shell.dataset.timelineReady === "true") {
      return;
    }

    bindItemHighlights(shell);
    initTimelineTabs(shell);
    initTimelineAnimations(shell);
    shell.dataset.timelineReady = "true";
  }

  function initAllTimelines() {
    document.querySelectorAll("[data-timeline-shell]").forEach(initTimelineShell);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initAllTimelines);
  } else {
    initAllTimelines();
  }

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" && typeof window.ScrollTrigger !== "undefined") {
      ScrollTrigger.refresh();
    }
  });
})();
</script>
