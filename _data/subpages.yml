    - title: "关注内容"
      items:
        - "足式机器人与轮式平台的结构搭建、模块配合和整机联调。"
        - "从方案推进、装配落地到赛前排障的连续记录。"
        - "保留阶段结果、关键问题和补充材料入口。"
    - title: "项目分布"
      items:
        - "RoboMaster：结构设计、模块配合与赛前迭代。"
        - "RC 足式 / 点足机器人：复刻、装配与稳定性验证。"
        - "智能车：传感、控制与系统联调。"
    - title: "浏览建议"
      items:
        - "先看最近更新，快速了解当前投入方向。"
        - "再根据标签筛到足式、结构、控制等具体主题。"
