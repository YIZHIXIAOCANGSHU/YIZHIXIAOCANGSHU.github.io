exploration:
  title: "自主探索"
  collection: "exploration"
  permalink: "/exploration/"
  kicker: "Independent Exploration"
  detail_kicker: "Exploration Detail"
  summary: "用于记录自驱学习、独立搭建的小项目、工具实验与开放式探索，适合放置还不完全属于课程、比赛或实验室的长期积累。"
  tags:
    - "自驱学习"
    - "独立项目"
    - "工具实验"
    - "开放探索"
    - "长期积累"
  actions:
    - label: "查看简历"
      url: "/cv/"
    - label: "比赛经历"
      url: "/projects/"
      style: "secondary"
  side_title: "探索定位"
  side_text: "这一页适合承接零散但有价值的实验、工具链尝试和长期兴趣方向，让站点内容不再只能落在比赛、课程或实验室三类里。"
  metrics:
    - kind: "count"
      label: "探索条目"
    - kind: "range"
      label: "时间覆盖"
    - kind: "latest"
      label: "最近更新"
  blocks:
    - title: "适合放什么"
      items:
        - "独立完成的小型项目、脚手架、工具链尝试。"
        - "对某个方向的系统阅读、实验验证和阶段笔记。"
        - "尚未形成正式项目，但值得持续沉淀的探索过程。"
    - title: "推荐写法"
      items:
        - "先写问题来源，再写尝试路线与阶段结果。"
        - "对比不同方案，保留失败路径和关键判断。"
        - "让条目更像实验日志，而不是一次性成果展示。"
    - title: "扩展方式"
      items:
        - "后续只要在 `_exploration` 下新增 Markdown 文件，页面会自动接入。"
        - "如果某条探索逐渐成熟，也可以再迁移到更合适的专区。"
        - "当前没有内容时，会先显示空状态，方便后续继续补。"
